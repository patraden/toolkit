---

- name: Assert version vars
  ansible.builtin.assert:
    that:
      - "ansible_facts.architecture == 'aarch64'"

- name: Load version vars
  with_first_found:
    - '../defaults/versions/{{ golang_version }}-{{ golang_architecture }}.yml'
  ansible.builtin.include_vars: '{{ item }}'

- name: Create download directory
  ansible.builtin.file:
    state: directory
    mode: 'u=rwx,g=rx,o=rx'
    dest: '{{ golang_download_dir }}'

- name: Download Go language SDK
  ansible.builtin.get_url:
    url: "https://go.dev/dl/{{ golang_filename }}"
    dest: "{{ golang_download_dir }}/{{ golang_filename }}"
    checksum: "sha256:{{ golang_sha256sum }}"
    force: no
    mode: 'u=rw,g=r,o=r'
  when: not ansible_check_mode

- name: Install unarchive dependencies
  become: true
  ansible.builtin.package:
    name:
      - gzip
      - tar
    state: present
  when: ansible_facts.pkg_mgr == 'apt' and not ansible_check_mode

- name: Create Go language SDK installation directory
  become: true
  ansible.builtin.file:
    state: directory
    owner: root
    group: root
    mode: 'u=rwx,g=rx,o=rx'
    dest: '{{ golang_install_dir }}'

- name: Install Go language SDK
  become: true
  ansible.builtin.unarchive:
    src: '{{ golang_download_dir }}/{{ golang_filename }}'
    remote_src: true
    extra_opts: '--strip-components=1'
    dest: '{{ golang_install_dir }}'
    owner: root
    group: root
    creates: '{{ golang_install_dir }}/bin'
  when: not ansible_check_mode

# Set Go language SDK environment variables
- name: Make sure /etc/profile.d exists
  become: true
  ansible.builtin.file:
    path: /etc/profile.d
    state: directory
    owner: root
    group: root
    mode: 'u=rwx,go=rx'

- name: Export Go language SDK environment variables
  become: true
  ansible.builtin.template:
    src: golang.sh.j2
    dest: /etc/profile.d/golang.sh
    owner: root
    group: root
    mode: 'u=rw,go=r'

# Set Go language SDK facts
- name: Create Ansible facts.d directory
  become: true
  ansible.builtin.file:
    state: directory
    dest: /etc/ansible/facts.d
    owner: root
    group: root
    mode: 'u=rwx,go=rx'

- name: Install Go language SDK facts
  become: true
  ansible.builtin.template:
    src: facts.j2
    dest: /etc/ansible/facts.d/golang.fact
    owner: root
    group: root
    mode: 'u=rw,go=r'
  when: not ansible_check_mode

- name: Re-read facts
  ansible.builtin.setup:
    filter: ansible_local