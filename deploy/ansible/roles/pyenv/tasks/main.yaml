---

- name: Install prerequisites
  become: true
  ansible.builtin.apt:
    state: present
    pkg:
    - build-essential
    - libssl-dev
    - zlib1g-dev
    - libbz2-dev
    - libreadline-dev
    - libsqlite3-dev
    - wget
    - curl
    - llvm
    - libncurses5-dev
    - libncursesw5-dev
    - xz-utils
    - tk-dev
    - libffi-dev
    - liblzma-dev
    - python-openssl
    - git

- name: Download Script
  ansible.builtin.get_url:
    url: https://pyenv.run
    dest: /tmp/pyenv.sh

- name: Check if pyenv installed
  register: pyenv_binary
  ansible.builtin.stat:
    path: ~/.pyenv/bin/pyenv

- name: Run script
  when: not pyenv_binary.stat.exists
  ansible.builtin.shell: |
    chmod a+x pyenv.sh
    ./pyenv.sh
    echo 'export PYENV_ROOT="$HOME/.pyenv"' >> ~/.profile
    echo 'export PATH="$PYENV_ROOT/bin:$PATH"' >> ~/.profile
    echo -e 'if command -v pyenv 1>/dev/null 2>&1; then\n eval "$(pyenv init -)"\nfi' >> ~/.profile
  args:
    executable: /bin/bash
    chdir: /tmp